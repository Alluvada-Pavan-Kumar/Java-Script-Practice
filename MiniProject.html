<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
   <style>
    body{
        font-family: Arial, sans-serif;
        text-align: center;
        margin-top: 80px;
        background: linear-gradient(to right, #74ebd5, #ACB6E5);
    }

    h2{
        color: #333;
    }

    input{
        padding: 10px;
        width: 220px;
        border-radius: 5px;
        border: none;
        outline: none;
    }

    button{
        padding: 10px 15px;
        margin-top: 10px;
        background-color: #ff9800;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
    }

    button:hover{
        background-color: #e68900;
    }

    #container{
        margin-top: 20px;
        display: inline-block;
        background: white;
        padding: 20px 30px;
        border-radius: 10px;
    }

    h1{
        margin: 5px;
        color: #333;
    }

    p{
        color: #555;
    }
</style>
</head>
<body>
    
    <body>

    <h2>🌤 Weather App</h2>

    <input type="text" id="input" placeholder="Enter city name"><br>

    <button onclick="showWeather()">Show Weather</button>

    <div id="container">
        <h1>☀️ 28°C</h1>
        <p>Sunny</p>
    </div>

    <script src="./miniproject.js"></script>
</body>
</html>
